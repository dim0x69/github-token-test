name: "Audit: Custom GITHUB_TOKEN Permissions"

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Explicit permissions block
# All scopes not specified default to 'none' (except metadata, which is read)
permissions:
  contents: read
  issues: write
  pull-requests: read
  id-token: write

jobs:
  audit-permissions:
    name: "Audit Custom Token Permissions"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Permissions Tester Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 test_permissions.py
